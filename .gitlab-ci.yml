# ECOOPS — Project CI/CD Configuration
# Emission Cost Optimizer — Operations Pipeline System
# This CI is for the ECOOPS project ITSELF (not the demo project).
# It validates documentation, lints YAML, and runs basic checks.

stages:
  - validate
  - test
  - analyze

# Validate YAML syntax of the flow configuration
validate_flow_yaml:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - echo "Validating flow configuration YAML..."
    - python -c "import yaml; yaml.safe_load(open('flows/ecoops-flow.yml')); print('Flow YAML is valid')"
  rules:
    - changes:
        - "flows/**/*.yml"
        - "flows/**/*.yaml"
        - ".gitlab-ci.yml"

# Validate the demo CI config
validate_demo_ci:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - echo "Validating demo CI YAML..."
    - python -c "import yaml; yaml.safe_load(open('demo/wasteful-ci.yml')); print('Demo CI YAML is valid')"
  rules:
    - changes:
        - "demo/**/*.yml"
        - ".gitlab-ci.yml"

# Lint Python code in the demo sample app
lint_demo_app:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install flake8
  script:
    - echo "Linting demo application code..."
    - flake8 demo/sample-app/ --max-line-length=120 --ignore=E402
  rules:
    - changes:
        - "demo/sample-app/**/*.py"
        - ".gitlab-ci.yml"
  allow_failure: true

# Run demo app tests
test_demo_app:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install flask pytest
  script:
    - echo "Running demo app tests..."
    - cd demo/sample-app && python -m pytest tests/ -v
  rules:
    - changes:
        - "demo/sample-app/**/*.py"
        - ".gitlab-ci.yml"
  allow_failure: true

# Lint core ECOOPS Python modules
lint_core:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install flake8
  script:
    - echo "Linting ECOOPS core modules..."
    - flake8 ecoops.py gitlab_client.py gemini_client.py reporter.py --max-line-length=120 --ignore=E402,W503
  rules:
    - changes:
        - "*.py"
        - ".gitlab-ci.yml"
  allow_failure: true

# Run ECOOPS analysis on this project (dry-run, scheduled)
ecoops_analyze:
  stage: analyze
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
  script:
    - echo "Running ECOOPS pipeline analysis (dry-run)..."
    - python ecoops.py --dry-run --json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  variables:
    GITLAB_TOKEN: $GITLAB_TOKEN
    GEMINI_API_KEY: $GEMINI_API_KEY
    GITLAB_PROJECT_ID: $CI_PROJECT_ID
  allow_failure: true
