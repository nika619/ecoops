# ECOOPS — CI/CD Configuration
stages:
  - validate
  - test

# Simple health check - always runs
pipeline_check:
  stage: validate
  script:
    - echo "ECOOPS pipeline OK"

# Lint backend Python modules
lint_core:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install flake8
  script:
    - flake8 backend/ --max-line-length=120 --ignore=E402,W503,E501

# Run unit tests
# ECOOPS: Added rules:changes to reduce waste
test_core:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest tests/ -v --cov=backend --cov-report=term-missing
  rules:
    - changes:
      - "backend/**/*.py"
      - "tests/**/*.py"
      - ".gitlab-ci.yml"
